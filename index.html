<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Click Game</title>
<style>
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: #fff;
}
h1 { margin-bottom: 10px; }
p { font-size: 18px; margin: 5px 0; }
button {
  padding: 15px 30px;
  font-size: 20px;
  margin-top: 20px;
  border: none;
  border-radius: 12px;
  background: #ffd700;
  color: #222;
  cursor: pointer;
  font-weight: bold;
}
button:hover { background: #ffec50; }
</style>
</head>
<body>

<h1>Click Game</h1>
<p>Score: <span id="score">0</span></p>
<button id="clickBtn">Click me!</button>
<p id="status"></p>

<script>
// ✅ Telegram WebApp ready
if(window.Telegram && Telegram.WebApp){
  Telegram.WebApp.ready();
}

// ==== Variables ====
let score = 0;
const token = "8729434477:AAFp0AKnet_TVtckNfSMjIT6Kt0eFPGBFr0"; // توكن تجريبي
const btn = document.getElementById("clickBtn");
const scoreEl = document.getElementById("score");
const statusEl = document.getElementById("status");

// ==== Click Handler ====
btn.onclick = () => {
    score++;
    scoreEl.textContent = score;

    // إرسال كل 10 نقاط
    if(score % 10 === 0){
        let userId = 123456789; // ضع هنا معرف تجريبي أو احصل منه في Telegram WebApp
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${userId}&text=Your Score: ${score}`)
          .then(res => statusEl.textContent = "✅ Score sent!")
          .catch(err => statusEl.textContent = "❌ Failed to send score");
    }
};
</script>
</body>
</html>
