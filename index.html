<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini MO Game</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
}
.container {
  background: rgba(0,0,0,0.4);
  padding: 20px;
  border-radius: 20px;
  width: 340px;
  text-align: center;
}
button {
  padding: 10px 20px;
  margin: 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#ffd700;
  font-weight:bold;
}
button:hover {
  background:#ffee55;
}
#highScore {
  margin-top: 15px;
  font-weight:bold;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-database-compat.js"></script>

</head>
<body>
<div class="container">
  <h2>Mini MO Game</h2>
  <p>Your Score: <span id="score">0</span></p>
  <button id="increaseBtn">+1 Point</button>
  <div id="highScore">High Score: 0 (—)</div>
</div>

<script>
// ===== Firebase config =====
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== Variables =====
let score = 0;
let userId = "guest_" + Math.floor(Math.random()*1000000);

// Telegram support
if(window.Telegram?.WebApp?.initDataUnsafe?.user?.id){
  userId = "tg_" + window.Telegram.WebApp.initDataUnsafe.user.id;
}

// ===== Update score =====
const scoreEl = document.getElementById("score");
const highEl = document.getElementById("highScore");

document.getElementById("increaseBtn").onclick = async () => {
  score++;
  scoreEl.textContent = score;

  // Save score to Firebase
  await db.ref('scores/' + userId).set({score: score});

  // Update high score
  updateHighScore();
}

// ===== Get high score =====
async function updateHighScore(){
  const snapshot = await db.ref('scores').orderByChild('score').limitToLast(1).get();
  if(snapshot.exists()){
    let highScore = 0;
    let owner = "—";
    snapshot.forEach(snap=>{
      highScore = snap.val().score;
      owner = snap.key;
    });
    highEl.textContent = `High Score: ${highScore} (${owner})`;
  }
}

// Load initial high score
updateHighScore();
</script>
</body>
</html>
